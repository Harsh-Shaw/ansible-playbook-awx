---
- name: Install and Configure Nginx Web Server
  hosts: all
  become: true  # Runs commands with sudo
  vars:
    web_server_port: 80

  tasks:
    - name: Ensure the system cache is updated
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600  # Only update if last update was over an hour ago

    - name: Install Nginx package
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure Nginx service is started and enabled on boot
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes

    - name: Create a custom index.html using Jinja2 variables
      ansible.builtin.copy:
        content: |
          <html>
            <body>
              <h1>Success!</h1>
              <p>This page was deployed via AWX to {{ ansible_hostname }}.</p>
              <p>Managed by: Harsh Shaw</p>
            </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Allow HTTP traffic through UFW firewall
      community.general.ufw:
        rule: allow
        port: "{{ web_server_port }}"
        proto: tcp
